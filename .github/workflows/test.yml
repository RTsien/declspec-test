name: __declspec(property) Cross-Platform Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Windows — MSVC (native support, no extra flags)
  # ============================================================
  windows-msvc:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-2019
            label: "VS 2019"
            artifact: result-windows-msvc-2019
          - os: windows-2022
            label: "VS 2022"
            artifact: result-windows-msvc-2022
    steps:
      - uses: actions/checkout@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show compiler version
        id: compiler
        run: |
          $ver = (cl 2>&1 | Select-String "Version" | Select-Object -First 1).ToString().Trim()
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo $ver
        shell: pwsh

      - name: Compile
        run: cl /EHsc /std:c++17 /W4 /WX /Fe:test.exe declspec_property_test.cpp
        shell: cmd

      - name: Run tests
        id: run
        run: |
          test.exe > result.txt 2>&1
          type result.txt
          echo result_file=result.txt >> %GITHUB_OUTPUT%
        shell: cmd

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: result.txt

  # ============================================================
  # Ubuntu — Clang (with -fms-extensions)
  # ============================================================
  linux-clang:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # 低版本 Clang 在 ubuntu-22.04 上可用
          - os: ubuntu-22.04
            clang-version: 11
          - os: ubuntu-22.04
            clang-version: 13
          # 当前版本在 ubuntu-latest (24.04)
          - os: ubuntu-latest
            clang-version: 14
          - os: ubuntu-latest
            clang-version: 16
          - os: ubuntu-latest
            clang-version: 18
    steps:
      - uses: actions/checkout@v5

      - name: Install Clang ${{ matrix.clang-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.clang-version }}

      - name: Show compiler version
        run: clang++-${{ matrix.clang-version }} --version

      - name: Compile (with -fms-extensions)
        run: |
          clang++-${{ matrix.clang-version }} -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            -o test declspec_property_test.cpp

      - name: Run tests
        run: |
          ./test | tee result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-linux-clang-${{ matrix.clang-version }}
          path: result.txt

      - name: Compile (without -fms-extensions, expect FAIL)
        run: |
          if clang++-${{ matrix.clang-version }} -std=c++17 -Wall -Wextra \
            -o test_noms declspec_property_test.cpp 2>/dev/null; then
            echo "ERROR: Should have failed without -fms-extensions!"
            exit 1
          else
            echo "PASS: Correctly failed without -fms-extensions"
          fi

  # ============================================================
  # Ubuntu — GCC (expect compile FAILURE)
  # ============================================================
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show GCC version
        run: g++ --version

      - name: Compile (expect FAIL — GCC does not support __declspec(property))
        run: |
          if g++ -std=c++17 -Wall -Wextra -o test declspec_property_test.cpp 2>/dev/null; then
            echo "UNEXPECTED: GCC compiled successfully?!"
            ./test | tee result.txt
          else
            echo "PASS: GCC correctly does not support __declspec(property)" | tee result.txt
          fi

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-linux-gcc
          path: result.txt

  # ============================================================
  # macOS — Apple Clang (Intel x86_64 + ARM64 分开测试)
  # ============================================================
  macos-clang:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64 (Apple Silicon)
            target_flag: ""
            artifact: result-macos-arm64
          - os: macos-14
            arch: x86_64 (via Rosetta on Apple Silicon)
            target_flag: "-target x86_64-apple-macos13"
            artifact: result-macos-x86_64
    steps:
      - uses: actions/checkout@v5

      - name: Show compiler & arch
        run: |
          clang++ --version
          echo "Host architecture: $(uname -m)"
          echo "Target: ${{ matrix.arch }}"

      - name: Compile (with -fms-extensions)
        run: |
          clang++ -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            ${{ matrix.target_flag }} \
            -o test declspec_property_test.cpp
          file test

      - name: Run tests
        run: |
          # x86_64 二进制在 arm64 mac 上通过 Rosetta 2 自动运行
          ./test | tee result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: result.txt

  # ============================================================
  # iOS — Xcode Clang + iPhone Simulator 运行
  # ============================================================
  ios-simulator:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode & SDK info
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-path
          xcrun --sdk iphonesimulator clang++ --version

      - name: Compile for iOS Simulator (arm64)
        run: |
          xcrun --sdk iphonesimulator clang++ \
            -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            -target arm64-apple-ios17.0-simulator \
            -isysroot $(xcrun --sdk iphonesimulator --show-sdk-path) \
            -o test_ios declspec_property_test.cpp
          file test_ios

      - name: Boot iOS Simulator
        run: |
          # 列出可用设备（调试用）
          xcrun simctl list devices available | grep "iPhone" | head -5
          # 提取 UUID（第一个括号内的内容，格式: iPhone 16 (UUID) (Shutdown)）
          DEVICE=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          echo "Using device: $DEVICE"
          echo "DEVICE_ID=$DEVICE" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE" || true
          # 等待启动完成
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Run tests on iOS Simulator
        run: |
          xcrun simctl spawn "$DEVICE_ID" ./test_ios | tee result.txt

      - name: Shutdown Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$DEVICE_ID" || true

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-ios-simulator
          path: result.txt

  # ============================================================
  # Android NDK — 交叉编译 (ubuntu) + 模拟器运行 (x86_64 + ARM64)
  # ============================================================
  android-ndk-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Android NDK r27c (Clang 18)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Show NDK Clang version
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ --version

      - name: Cross-compile ARM64
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_arm64 declspec_property_test.cpp bionic_tls_align.S
          file test_arm64

      - name: Cross-compile ARM32
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_arm32 declspec_property_test.cpp bionic_tls_align.S
          file test_arm32

      - name: Cross-compile x86_64
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_x86_64 declspec_property_test.cpp
          file test_x86_64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries
          path: |
            test_arm64
            test_arm32
            test_x86_64

  # --- Android NDK r21e (Clang 9) — 最低版本编译验证 ---
  android-ndk-r21e:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Android NDK r21e (Clang 9)
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Show NDK Clang version
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ --version

      - name: Cross-compile ARM64 (NDK r21e, static + TLS fix)
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_arm64 declspec_property_test.cpp bionic_tls_align.S
          file test_arm64

      - name: Cross-compile ARM32 (NDK r21e)
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions \
            -o test_arm32 declspec_property_test.cpp
          file test_arm32

      - name: Cross-compile x86_64 (NDK r21e)
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions \
            -o test_x86_64 declspec_property_test.cpp
          file test_x86_64

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: android-binary-r21e-arm64
          path: test_arm64

  # --- Android ARM64 运行 NDK r21e 二进制 (Docker + QEMU) ---
  android-run-arm64-r21e:
    runs-on: ubuntu-latest
    needs: android-ndk-r21e
    steps:
      - name: Download ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: android-binary-r21e-arm64

      - name: Set up QEMU for Docker multiarch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run ARM64 binary in arm64 Docker container
        run: |
          chmod +x test_arm64
          docker run --rm --platform linux/arm64 \
            -v "$PWD/test_arm64:/test_arm64:ro" \
            arm64v8/ubuntu:24.04 \
            /test_arm64 | tee result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-android-arm64-r21e
          path: result.txt

  # --- Android x86_64 模拟器运行 (Linux KVM 加速) ---
  android-run-x86_64:
    runs-on: ubuntu-latest
    needs: android-ndk-compile
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: android-binaries

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on Android Emulator (x86_64, API 30)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            adb push test_x86_64 /data/local/tmp/test
            adb shell chmod +x /data/local/tmp/test
            adb shell /data/local/tmp/test | tee result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-android-x86_64-emu
          path: result.txt

  # --- Android ARM64 运行 (Docker + QEMU binfmt) ---
  # Google QEMU2 模拟器不支持跨架构（x86_64 host 无法跑 arm64 image）。
  # NDK Bionic 静态二进制在 qemu-user-static 下有 TLS 对齐问题。
  # 解决方案：用 Docker multiarch (arm64v8/ubuntu) 容器运行，
  # Docker 内通过 QEMU binfmt 透明翻译，且有完整 Linux 环境处理 TLS。
  android-run-arm64:
    runs-on: ubuntu-latest
    needs: android-ndk-compile
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: android-binaries

      - name: Set up QEMU for Docker multiarch
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run ARM64 binary in arm64 Docker container
        run: |
          chmod +x test_arm64
          docker run --rm --platform linux/arm64 \
            -v "$PWD/test_arm64:/test_arm64:ro" \
            arm64v8/ubuntu:24.04 \
            /test_arm64 | tee result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-android-arm64-emu
          path: result.txt

  # ============================================================
  # Summary — 汇总所有平台结果
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: [windows-msvc, linux-clang, linux-gcc, macos-clang, ios-simulator, android-ndk-compile, android-ndk-r21e, android-run-x86_64, android-run-arm64, android-run-arm64-r21e]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/

      - name: Generate summary report
        run: |
          echo "# 🧪 __declspec(property) 跨平台测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 目标平台 | 宿主机 | 编译器 | 编译 | 运行 | 结果 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|--------|------|------|------|" >> $GITHUB_STEP_SUMMARY

          extract_results() {
            local file="$1"
            passed=$(grep -o '[0-9]* passed' "$file" | head -1)
            failed=$(grep -o '[0-9]* failed' "$file" | head -1)
            echo "${passed:-? passed}, ${failed:-? failed}"
          }

          # Windows MSVC
          for msvc in "2019" "2022"; do
            if [ -f "results/result-windows-msvc-${msvc}/result.txt" ]; then
              res=$(extract_results "results/result-windows-msvc-${msvc}/result.txt")
              echo "| Windows x86_64 | windows-${msvc} | MSVC (VS ${msvc}) | ✅ | ✅ ${res} | ${{ needs.windows-msvc.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Windows x86_64 | windows-${msvc} | MSVC (VS ${msvc}) | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Linux Clang versions
          for ver in 11 13 14 16 18; do
            if [ -f "results/result-linux-clang-${ver}/result.txt" ]; then
              res=$(extract_results "results/result-linux-clang-${ver}/result.txt")
              if [ "$ver" -le 13 ]; then
                host="ubuntu-22.04"
              else
                host="ubuntu-latest"
              fi
              echo "| Linux x86_64 | ${host} | Clang ${ver} | ✅ | ✅ ${res} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Linux x86_64 | ubuntu | Clang ${ver} | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Linux GCC
          if [ -f results/result-linux-gcc/result.txt ]; then
            echo "| Linux x86_64 | ubuntu-latest | GCC | ❌ 预期失败 | — | ✅ 符合预期 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux x86_64 | ubuntu-latest | GCC | — | — | ${{ needs.linux-gcc.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # macOS ARM64
          if [ -f results/result-macos-arm64/result.txt ]; then
            res=$(extract_results results/result-macos-arm64/result.txt)
            echo "| macOS arm64 | macos-14 (Apple Silicon) | Apple Clang | ✅ | ✅ ${res} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| macOS arm64 | macos-14 (Apple Silicon) | Apple Clang | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # macOS x86_64 via Rosetta
          if [ -f results/result-macos-x86_64/result.txt ]; then
            res=$(extract_results results/result-macos-x86_64/result.txt)
            echo "| macOS x86_64 | macos-14 + Rosetta 2 | Apple Clang | ✅ | ✅ ${res} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| macOS x86_64 | macos-14 + Rosetta 2 | Apple Clang | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # iOS Simulator
          if [ -f results/result-ios-simulator/result.txt ]; then
            res=$(extract_results results/result-ios-simulator/result.txt)
            echo "| iOS arm64 | macos-14 + Simulator | Xcode Clang | ✅ | ✅ ${res} | ${{ needs.ios-simulator.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| iOS arm64 | macos-14 + Simulator | Xcode Clang | — | — | ${{ needs.ios-simulator.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android x86_64 模拟器
          if [ -f results/result-android-x86_64-emu/result.txt ]; then
            res=$(extract_results results/result-android-x86_64-emu/result.txt)
            echo "| Android x86_64 | ubuntu + KVM 模拟器 | NDK Clang 18 | ✅ | ✅ ${res} | ${{ needs.android-run-x86_64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android x86_64 | ubuntu + KVM 模拟器 | NDK Clang 18 | ✅ | — | ${{ needs.android-run-x86_64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android ARM64 模拟器
          if [ -f results/result-android-arm64-emu/result.txt ]; then
            res=$(extract_results results/result-android-arm64-emu/result.txt)
            echo "| Android ARM64 | ubuntu + Docker arm64 (QEMU) | NDK Clang 18 | ✅ | ✅ ${res} | ${{ needs.android-run-arm64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android ARM64 | ubuntu + Docker arm64 (QEMU) | NDK Clang 18 | ✅ | — | ${{ needs.android-run-arm64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android ARM32 (NDK 交叉编译验证)
          echo "| Android ARM32 | ubuntu (NDK 交叉编译) | NDK Clang 18 | ✅ | — (仅编译) | ${{ needs.android-ndk-compile.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY

          # Android NDK r21e (Clang 9) — 最低版本
          echo "| Android ARM64 | ubuntu-22.04 | NDK r21e (Clang 9) | ${{ needs.android-ndk-r21e.result == 'success' && '✅' || '❌' }} | — (仅编译) | ${{ needs.android-ndk-r21e.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          if [ -f results/result-android-arm64-r21e/result.txt ]; then
            res=$(extract_results results/result-android-arm64-r21e/result.txt)
            echo "| Android ARM64 | ubuntu + Docker arm64 | NDK r21e (Clang 9) | ✅ | ✅ ${res} | ${{ needs.android-run-arm64-r21e.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android ARM64 | ubuntu + Docker arm64 | NDK r21e (Clang 9) | ✅ | — | ${{ needs.android-run-arm64-r21e.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Android ARM32 | ubuntu-22.04 | NDK r21e (Clang 9) | ${{ needs.android-ndk-r21e.result == 'success' && '✅' || '❌' }} | — (仅编译) | ${{ needs.android-ndk-r21e.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📝 特殊验证方式说明" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 目标平台 | 验证方式 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x86_64 | 交叉编译 + Rosetta 2 | GitHub 已淘汰 Intel (macos-13) runner；在 macos-14 (arm64) 上用 \`-target x86_64-apple-macos13\` 交叉编译，通过 Rosetta 2 指令翻译运行，与原生 Intel 行为等价 |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS arm64 | Xcode + iPhone Simulator | 在 macos-14 上通过 \`xcrun simctl spawn\` 在 iPhone Simulator 中运行，等同真机 CPU 执行（非指令翻译） |" >> $GITHUB_STEP_SUMMARY
          echo "| Android x86_64 | KVM 硬件加速模拟器 | 在 ubuntu runner 上通过 Android Emulator (API 30) + KVM 硬件虚拟化运行，接近原生性能 |" >> $GITHUB_STEP_SUMMARY
          echo "| Android ARM64 | Docker multiarch + QEMU binfmt | NDK 交叉编译的静态 Bionic 二进制，在 \`arm64v8/ubuntu\` Docker 容器中通过 QEMU binfmt 透明翻译执行。Docker 的 QEMU 集成处理了 TLS 对齐问题（与裸 qemu-user-static 不同） |" >> $GITHUB_STEP_SUMMARY
          echo "| Android ARM32 | NDK 交叉编译 | 编译验证通过（零错误零警告），但无 ARM32 Android 模拟器可用于运行。ARM32 与 ARM64 共享相同的 Clang \`-fms-extensions\` 编译器前端，运行时行为等价 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **为什么 QEMU user-mode 可以验证正确性？** \`__declspec(property)\` 是纯编译期语法糖，编译器将属性访问重写为函数调用，生成的机器码与手写 Getter/Setter 等价。QEMU user-mode 提供精确的 CPU 指令翻译，足以验证编译器生成代码的逻辑正确性。" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 各平台详细输出" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for dir in results/result-*/; do
            name=$(basename "$dir" | sed 's/result-//')
            echo "### 📦 ${name}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "${dir}/result.txt" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 \`__declspec(property)\` 是纯编译期语法糖，无运行时开销。GCC 不支持此特性，但 UE 不使用 GCC。" >> $GITHUB_STEP_SUMMARY
