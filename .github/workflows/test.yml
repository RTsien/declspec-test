name: __declspec(property) Cross-Platform Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # Windows — MSVC (native support, no extra flags)
  # ============================================================
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show compiler version
        id: compiler
        run: |
          $ver = (cl 2>&1 | Select-String "Version" | Select-Object -First 1).ToString().Trim()
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo $ver
        shell: pwsh

      - name: Compile
        run: cl /EHsc /std:c++17 /W4 /WX /Fe:test.exe declspec_property_test.cpp
        shell: cmd

      - name: Run tests
        id: run
        run: |
          test.exe > result.txt 2>&1
          type result.txt
          echo result_file=result.txt >> %GITHUB_OUTPUT%
        shell: cmd

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-windows-msvc
          path: result.txt

  # ============================================================
  # Ubuntu — Clang (with -fms-extensions)
  # ============================================================
  linux-clang:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        clang-version: [14, 16, 18]
    steps:
      - uses: actions/checkout@v5

      - name: Install Clang ${{ matrix.clang-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.clang-version }}

      - name: Show compiler version
        run: clang++-${{ matrix.clang-version }} --version

      - name: Compile (with -fms-extensions)
        run: |
          clang++-${{ matrix.clang-version }} -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            -o test declspec_property_test.cpp

      - name: Run tests
        run: |
          ./test | tee result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-linux-clang-${{ matrix.clang-version }}
          path: result.txt

      - name: Compile (without -fms-extensions, expect FAIL)
        run: |
          if clang++-${{ matrix.clang-version }} -std=c++17 -Wall -Wextra \
            -o test_noms declspec_property_test.cpp 2>/dev/null; then
            echo "ERROR: Should have failed without -fms-extensions!"
            exit 1
          else
            echo "PASS: Correctly failed without -fms-extensions"
          fi

  # ============================================================
  # Ubuntu — GCC (expect compile FAILURE)
  # ============================================================
  linux-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show GCC version
        run: g++ --version

      - name: Compile (expect FAIL — GCC does not support __declspec(property))
        run: |
          if g++ -std=c++17 -Wall -Wextra -o test declspec_property_test.cpp 2>/dev/null; then
            echo "UNEXPECTED: GCC compiled successfully?!"
            ./test | tee result.txt
          else
            echo "PASS: GCC correctly does not support __declspec(property)" | tee result.txt
          fi

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-linux-gcc
          path: result.txt

  # ============================================================
  # macOS — Apple Clang (Intel x86_64 + ARM64 分开测试)
  # ============================================================
  macos-clang:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64 (Apple Silicon)
            target_flag: ""
            artifact: result-macos-arm64
          - os: macos-14
            arch: x86_64 (via Rosetta on Apple Silicon)
            target_flag: "-target x86_64-apple-macos13"
            artifact: result-macos-x86_64
    steps:
      - uses: actions/checkout@v5

      - name: Show compiler & arch
        run: |
          clang++ --version
          echo "Host architecture: $(uname -m)"
          echo "Target: ${{ matrix.arch }}"

      - name: Compile (with -fms-extensions)
        run: |
          clang++ -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            ${{ matrix.target_flag }} \
            -o test declspec_property_test.cpp
          file test

      - name: Run tests
        run: |
          # x86_64 二进制在 arm64 mac 上通过 Rosetta 2 自动运行
          ./test | tee result.txt

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: result.txt

  # ============================================================
  # iOS — Xcode Clang + iPhone Simulator 运行
  # ============================================================
  ios-simulator:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Show Xcode & SDK info
        run: |
          xcodebuild -version
          xcrun --sdk iphonesimulator --show-sdk-path
          xcrun --sdk iphonesimulator clang++ --version

      - name: Compile for iOS Simulator (arm64)
        run: |
          xcrun --sdk iphonesimulator clang++ \
            -std=c++17 -Wall -Wextra -Werror \
            -fms-extensions \
            -target arm64-apple-ios17.0-simulator \
            -isysroot $(xcrun --sdk iphonesimulator --show-sdk-path) \
            -o test_ios declspec_property_test.cpp
          file test_ios

      - name: Boot iOS Simulator
        run: |
          # 列出可用设备（调试用）
          xcrun simctl list devices available | grep "iPhone" | head -5
          # 提取 UUID（第一个括号内的内容，格式: iPhone 16 (UUID) (Shutdown)）
          DEVICE=$(xcrun simctl list devices available | grep "iPhone" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          echo "Using device: $DEVICE"
          echo "DEVICE_ID=$DEVICE" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE" || true
          # 等待启动完成
          xcrun simctl bootstatus "$DEVICE" -b

      - name: Run tests on iOS Simulator
        run: |
          xcrun simctl spawn "$DEVICE_ID" ./test_ios | tee result.txt

      - name: Shutdown Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$DEVICE_ID" || true

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-ios-simulator
          path: result.txt

  # ============================================================
  # Android NDK — 交叉编译 (ubuntu) + 模拟器运行 (x86_64 + ARM64)
  # ============================================================
  android-ndk-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Show NDK Clang version
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ --version

      - name: Cross-compile ARM64
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_arm64 declspec_property_test.cpp
          file test_arm64

      - name: Cross-compile ARM32
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_arm32 declspec_property_test.cpp
          file test_arm32

      - name: Cross-compile x86_64
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android26-clang++ \
            -std=c++17 -Wall -Wextra -Werror -fms-extensions -static \
            -o test_x86_64 declspec_property_test.cpp
          file test_x86_64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries
          path: |
            test_arm64
            test_arm32
            test_x86_64

  # --- Android x86_64 模拟器运行 (Linux KVM 加速) ---
  android-run-x86_64:
    runs-on: ubuntu-latest
    needs: android-ndk-compile
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: android-binaries

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run on Android Emulator (x86_64, API 30)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -no-audio -no-boot-anim
          script: |
            adb push test_x86_64 /data/local/tmp/test
            adb shell chmod +x /data/local/tmp/test
            adb shell /data/local/tmp/test | tee result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-android-x86_64-emu
          path: result.txt

  # --- Android ARM 模拟器运行 (Linux + QEMU TCG 软件模拟) ---
  android-run-arm:
    runs-on: ubuntu-latest
    needs: android-ndk-compile
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: android-binaries

      - name: Install QEMU user-mode emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          # 验证 binfmt 已注册
          ls /proc/sys/fs/binfmt_misc/ | grep -i arm || true
          # 测试 qemu-aarch64-static 可用
          qemu-aarch64-static --version | head -1
          qemu-arm-static --version | head -1

      - name: Run ARM64 binary via QEMU user-mode
        run: |
          echo "=== ARM64 (via qemu-aarch64-static) ===" | tee result.txt
          chmod +x test_arm64
          qemu-aarch64-static ./test_arm64 | tee -a result.txt
          echo "" >> result.txt

      - name: Run ARM32 binary via QEMU user-mode
        run: |
          echo "=== ARM32 (via qemu-arm-static) ===" | tee -a result.txt
          chmod +x test_arm32
          qemu-arm-static ./test_arm32 | tee -a result.txt

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-android-arm-qemu
          path: result.txt

  # ============================================================
  # Summary — 汇总所有平台结果
  # ============================================================
  summary:
    runs-on: ubuntu-latest
    needs: [windows-msvc, linux-clang, linux-gcc, macos-clang, ios-simulator, android-ndk-compile, android-run-x86_64, android-run-arm]
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: results/

      - name: Generate summary report
        run: |
          echo "# 🧪 __declspec(property) 跨平台测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 目标平台 | 宿主机 | 编译器 | 编译 | 运行 | 结果 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|--------|------|------|------|" >> $GITHUB_STEP_SUMMARY

          # Windows MSVC
          if [ -f results/result-windows-msvc/result.txt ]; then
            passed=$(grep -oP '\d+ passed' results/result-windows-msvc/result.txt || echo "?")
            failed=$(grep -oP '\d+ failed' results/result-windows-msvc/result.txt || echo "?")
            echo "| Windows x86_64 | windows-latest | MSVC | ✅ | ✅ $passed, $failed | ${{ needs.windows-msvc.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Windows x86_64 | windows-latest | MSVC | — | — | ${{ needs.windows-msvc.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Linux Clang versions
          for ver in 14 16 18; do
            if [ -f "results/result-linux-clang-${ver}/result.txt" ]; then
              passed=$(grep -oP '\d+ passed' "results/result-linux-clang-${ver}/result.txt" || echo "?")
              failed=$(grep -oP '\d+ failed' "results/result-linux-clang-${ver}/result.txt" || echo "?")
              echo "| Linux x86_64 | ubuntu-latest | Clang ${ver} | ✅ | ✅ ${passed}, ${failed} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Linux x86_64 | ubuntu-latest | Clang ${ver} | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          # Linux GCC
          if [ -f results/result-linux-gcc/result.txt ]; then
            gcc_result=$(cat results/result-linux-gcc/result.txt)
            echo "| Linux x86_64 | ubuntu-latest | GCC | ❌ 预期失败 | — | ✅ 符合预期 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Linux x86_64 | ubuntu-latest | GCC | — | — | ${{ needs.linux-gcc.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # macOS ARM64
          if [ -f results/result-macos-arm64/result.txt ]; then
            passed=$(grep -oP '\d+ passed' results/result-macos-arm64/result.txt || echo "?")
            failed=$(grep -oP '\d+ failed' results/result-macos-arm64/result.txt || echo "?")
            echo "| macOS arm64 | macos-14 (Apple Silicon) | Apple Clang | ✅ | ✅ ${passed}, ${failed} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| macOS arm64 | macos-14 (Apple Silicon) | Apple Clang | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # macOS x86_64 via Rosetta
          if [ -f results/result-macos-x86_64/result.txt ]; then
            passed=$(grep -oP '\d+ passed' results/result-macos-x86_64/result.txt || echo "?")
            failed=$(grep -oP '\d+ failed' results/result-macos-x86_64/result.txt || echo "?")
            echo "| macOS x86_64 | macos-14 + Rosetta 2 | Apple Clang | ✅ | ✅ ${passed}, ${failed} | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| macOS x86_64 | macos-14 + Rosetta 2 | Apple Clang | — | — | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          fi

          # iOS Simulator
          if [ -f results/result-ios-simulator/result.txt ]; then
            passed=$(grep -oP '\d+ passed' results/result-ios-simulator/result.txt || echo "?")
            failed=$(grep -oP '\d+ failed' results/result-ios-simulator/result.txt || echo "?")
            echo "| iOS arm64 | macos-14 + Simulator | Xcode Clang | ✅ | ✅ ${passed}, ${failed} | ${{ needs.ios-simulator.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| iOS arm64 | macos-14 + Simulator | Xcode Clang | — | — | ${{ needs.ios-simulator.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android x86_64 模拟器
          if [ -f results/result-android-x86_64-emu/result.txt ]; then
            passed=$(grep -oP '\d+ passed' results/result-android-x86_64-emu/result.txt || echo "?")
            failed=$(grep -oP '\d+ failed' results/result-android-x86_64-emu/result.txt || echo "?")
            echo "| Android x86_64 | ubuntu + KVM 模拟器 | NDK Clang 18 | ✅ | ✅ ${passed}, ${failed} | ${{ needs.android-run-x86_64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android x86_64 | ubuntu + KVM 模拟器 | NDK Clang 18 | ✅ | — | ${{ needs.android-run-x86_64.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Android ARM64 + ARM32 QEMU
          if [ -f results/result-android-arm-qemu/result.txt ]; then
            # 提取两个 "Results:" 行（ARM64 是第一个，ARM32 是第二个）
            arm64_line=$(grep "Results:" results/result-android-arm-qemu/result.txt | head -1)
            arm32_line=$(grep "Results:" results/result-android-arm-qemu/result.txt | tail -1)

            arm64_passed=$(echo "$arm64_line" | grep -o '[0-9]* passed')
            arm64_failed=$(echo "$arm64_line" | grep -o '[0-9]* failed')
            arm32_passed=$(echo "$arm32_line" | grep -o '[0-9]* passed')
            arm32_failed=$(echo "$arm32_line" | grep -o '[0-9]* failed')

            echo "| Android ARM64 | ubuntu + QEMU user-mode | NDK Clang 18 | ✅ | ✅ ${arm64_passed:-?}, ${arm64_failed:-?} | ${{ needs.android-run-arm.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Android ARM32 | ubuntu + QEMU user-mode | NDK Clang 18 | ✅ | ✅ ${arm32_passed:-?}, ${arm32_failed:-?} | ${{ needs.android-run-arm.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Android ARM64 | ubuntu + QEMU user-mode | NDK Clang 18 | ✅ | — | ${{ needs.android-run-arm.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Android ARM32 | ubuntu + QEMU user-mode | NDK Clang 18 | ✅ | — | ${{ needs.android-run-arm.result == 'success' && '✅ PASS' || '❌ FAIL' }} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📝 特殊验证方式说明" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 目标平台 | 验证方式 | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| macOS x86_64 | 交叉编译 + Rosetta 2 | GitHub 已淘汰 Intel (macos-13) runner；在 macos-14 (arm64) 上用 \`-target x86_64-apple-macos13\` 交叉编译，通过 Rosetta 2 指令翻译运行，与原生 Intel 行为等价 |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS arm64 | Xcode + iPhone Simulator | 在 macos-14 上通过 \`xcrun simctl spawn\` 在 iPhone Simulator 中运行，等同真机 CPU 执行（非指令翻译） |" >> $GITHUB_STEP_SUMMARY
          echo "| Android x86_64 | KVM 硬件加速模拟器 | 在 ubuntu runner 上通过 Android Emulator (API 30) + KVM 硬件虚拟化运行，接近原生性能 |" >> $GITHUB_STEP_SUMMARY
          echo "| Android ARM64 | QEMU user-mode | 在 ubuntu x86_64 上通过 \`qemu-aarch64-static\` 进行 CPU 指令级翻译执行静态链接的 ARM64 ELF 二进制，验证运行时行为正确性 |" >> $GITHUB_STEP_SUMMARY
          echo "| Android ARM32 | QEMU user-mode | 在 ubuntu x86_64 上通过 \`qemu-arm-static\` 进行 CPU 指令级翻译执行静态链接的 ARM32 ELF 二进制，验证运行时行为正确性 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **为什么 QEMU user-mode 可以验证正确性？** \`__declspec(property)\` 是纯编译期语法糖，编译器将属性访问重写为函数调用，生成的机器码与手写 Getter/Setter 等价。QEMU user-mode 提供精确的 CPU 指令翻译，足以验证编译器生成代码的逻辑正确性。" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📋 各平台详细输出" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for dir in results/result-*/; do
            name=$(basename "$dir" | sed 's/result-//')
            echo "### 📦 ${name}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "${dir}/result.txt" 2>/dev/null || echo "(no output)"
            cat "${dir}/result.txt" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no output)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 \`__declspec(property)\` 是纯编译期语法糖，无运行时开销。GCC 不支持此特性，但 UE 不使用 GCC。" >> $GITHUB_STEP_SUMMARY
